apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cv-to-ats
  namespace: manfred
  labels:
    app.kubernetes.io/name: cv-to-ats
    app.kubernetes.io/part-of: manfred
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cv-to-ats
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
