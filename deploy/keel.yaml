# Keel — image-update operator scoped to the `manfred` namespace.
# Polls GHCR for new digests of the tags referenced by Deployments
# annotated with `keel.sh/*` and triggers a rolling update when the
# digest changes. Uses the existing `imagePullSecrets` of each
# Deployment to authenticate against private GHCR.
apiVersion: v1
kind: Namespace
metadata:
  name: keel
  labels:
    app.kubernetes.io/part-of: keel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keel
  namespace: keel
---
# Keel's informers list workloads at cluster scope on startup even
# when WATCH_NAMESPACE is set. Grant cluster-wide READ-ONLY access
# to the workload kinds it watches; WRITE permissions are scoped to
# the `manfred` namespace by the Role below.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keel-cluster-read
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keel-cluster-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keel-cluster-read
subjects:
  - kind: ServiceAccount
    name: keel
    namespace: keel
---
# Scope Keel's real powers (read pods/secrets/deployments and
# patch deployments) ONLY to the manfred namespace. It cannot
# touch anything else in the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keel-manfred
  namespace: manfred
rules:
  - apiGroups: [""]
    resources: ["pods", "secrets", "configmaps", "events"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keel-manfred
  namespace: manfred
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keel-manfred
subjects:
  - kind: ServiceAccount
    name: keel
    namespace: keel
---
apiVersion: v1
kind: Service
metadata:
  name: keel
  namespace: keel
  labels:
    app.kubernetes.io/name: keel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keel
  ports:
    - name: http
      port: 9300
      targetPort: 9300
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keel
  namespace: keel
  labels:
    app.kubernetes.io/name: keel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: keel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keel
    spec:
      serviceAccountName: keel
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keel
          image: keelhq/keel:0.20.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9300
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WATCH_NAMESPACE
              value: manfred
            - name: POLL
              value: "true"
            - name: HELM_PROVIDER
              value: "false"
            - name: HELM3_PROVIDER
              value: "false"
            - name: NOTIFICATION_LEVEL
              value: info
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
